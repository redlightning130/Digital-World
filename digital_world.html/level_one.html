<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital World - Level 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        #blueprint-hud {
    position: fixed;
    right: -360px;
    top: 40%;
    width: 340px;
    padding: 20px;
    background: rgba(0, 10, 10, 0.95);
    border: 3px solid #00ffff;
    color: #00ffff;
    font-size: 18px;
    box-shadow: 0 0 30px rgba(0,255,255,0.5);
    transition: right 0.5s ease;
    z-index: 200;
}

#blueprint-hud.show {
    right: 20px;
}

        #hotbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .mini {
            width: 100%;
            height: 100%;
        }

        .mini.scanner {
            background: linear-gradient(45deg, #00ffff, #003333);
        }

        .mini.generator {
            background: #00ffff;
            box-shadow: inset 0 0 10px #000;
        }

        .mini.creature {
            background: radial-gradient(circle, #00ffff, #001111);
            border-radius: 50%;
        }

        .slot {
             width: 50px;
             height: 50px;
             border: 2px solid #00ffff;
             background: rgba(0, 20, 20, 0.7);
             box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .slot.selected {
             border-color: #00ff88;
             box-shadow: 0 0 20px #00ff88;
        }

        .chip-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(0, 20, 20, 0.8);
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .fragment-counter {
            position: absolute;
            top: 80px;
            right: 20px;
            padding: 12px 20px;
            background: rgba(0, 20, 20, 0.8);
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: #00ffff;
            font-size: 18px;
            text-shadow: 0 0 10px #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: rgba(0, 20, 20, 0.8);
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: #00ffff;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .scanner-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 3px solid #00ffff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .scanner-indicator.active {
            opacity: 0.5;
            animation: scanPulse 2s infinite;
        }

        @keyframes scanPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.7; }
        }

        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #00ffff;
            box-shadow: 0 0 5px #00ffff;
        }

        .crosshair::before {
            width: 2px;
            height: 10px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair::after {
            width: 10px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .notification {
            position: absolute;
            top: 140px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 100, 100, 0.9);
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .notification.show {
            opacity: 1;
        }

        .portal-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 50px;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #00ff88;
            border-radius: 10px;
            color: #00ff88;
            font-size: 28px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.7);
        }

        .portal-message.show {
            opacity: 1;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: #00ffff;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffff;
        }
        /* ===== FABRICATOR UI ===== */
#fabricator-ui {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    background: rgba(0, 10, 10, 0.95);
    border: 3px solid #00ffff;
    box-shadow: 0 0 40px rgba(0,255,255,0.4);
    display: none;
    pointer-events: auto;
    z-index: 300;
}

#fabricator-header {
    padding: 12px;
    text-align: center;
    color: #00ffff;
    font-size: 22px;
    border-bottom: 2px solid #00ffff;
}

#fabricator-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 16px;
}

.fabricator-item {
    height: 80px;
    background: rgba(0, 20, 20, 0.9);
    border: 2px solid #00ffff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #00ff88;
    cursor: pointer;
    position: relative;
}

.fabricator-item:hover {
    box-shadow: 0 0 15px #00ff88;
}

.fabricator-tooltip {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    border: 1px solid #00ffff;
    padding: 6px 10px;
    font-size: 12px;
    white-space: nowrap;
    display: none;
}

.fabricator-item:hover .fabricator-tooltip {
    display: block;
}

        /* ===== INVENTORY UI ===== */
        #inventory-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            width: min(92vw, 820px);
            height: min(88vh, 720px);
            transform: translate(-50%, -50%);
            background: rgba(0, 10, 10, 0.98);
            border: 3px solid #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4);
            display: none;
            pointer-events: auto;
            z-index: 500;
            color: #00ff88;
        }

        #inventory-ui.visible {
            display: block;
        }

        .inventory-header {
            display: flex;
            gap: 10px;
            padding: 16px;
        }

        .inventory-tab {
            flex: 1;
            background: rgba(0, 20, 20, 0.9);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 14px 0;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
        }

        .inventory-tab.active {
            background: #00ff88;
            color: #001a1a;
            border-color: #00ff88;
            box-shadow: 0 0 18px #00ff88;
        }

        .inventory-close {
            position: absolute;
            top: 12px;
            right: 12px;
            border: 2px solid #00ffff;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff88;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .inventory-content {
            padding: 0 18px 18px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            height: calc(100% - 82px);
        }

        .inventory-panel {
            background: rgba(0, 10, 10, 0.95);
            border: 2px solid #00ffff;
            padding: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .inventory-grid,
        .inventory-hotbar {
            display: grid;
            grid-template-columns: repeat(10, minmax(0, 1fr));
            gap: 10px;
        }

        .inventory-slot {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: rgba(0, 20, 20, 0.9);
            border: 2px solid #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        .inventory-slot.empty:hover {
            background: rgba(0, 40, 40, 0.95);
        }

        .inventory-slot.selected {
            border-color: #00ff88;
            box-shadow: 0 0 14px #00ff88;
        }

        .item-icon {
            width: 70%;
            height: 70%;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-icon.scanner {
            background: linear-gradient(135deg, #00ffff, #003333);
            box-shadow: inset 0 0 10px #00ff88;
        }

        .item-icon.powerGenerator {
            background: linear-gradient(135deg, #00ff88, #002a1a);
            box-shadow: inset 0 0 10px #00ff88;
        }

        .item-icon.creature {
            background: radial-gradient(circle, #00ffff, #001111);
            border-radius: 50%;
            box-shadow: inset 0 0 8px #00ff88;
        }

        .inventory-subtitle {
            font-size: 14px;
            letter-spacing: 0.15em;
            color: #00ff88;
            padding-left: 4px;
        }

        .inventory-helper {
            color: #00ff88;
            font-size: 13px;
            opacity: 0.9;
        }

        .small-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 20, 20, 0.95);
            border: 2px solid #00ffff;
            color: #00ff88;
            padding: 12px 14px;
            cursor: pointer;
            border-radius: 8px;
        }

        .small-button:hover {
            background: rgba(0, 40, 40, 0.95);
        }

        #drones-ui {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #drone-add-state {
            background: rgba(0, 20, 20, 0.9);
            border: 2px solid #00ffff;
            padding: 14px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #equipment-ui {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            align-items: center;
            justify-items: center;
        }

        .equip-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .equip-slot {
            width: 64px;
            height: 64px;
            background: rgba(0, 20, 20, 0.95);
            border: 2px solid #00ffff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 12px;
        }

        .equip-slot::before {
            content: '';
            display: block;
        }

        .equip-slot.helmet::before {
            width: 42px;
            height: 30px;
            background: radial-gradient(circle at 50% 20%, #00ffff 30%, #003333 100%);
            border-radius: 50% 50% 40% 40%;
        }

        .equip-slot.breastplate::before {
            width: 38px;
            height: 42px;
            background: linear-gradient(180deg, #00ff88 20%, #003333 100%);
            border-radius: 16px;
        }

        .equip-slot.pants::before {
            width: 34px;
            height: 38px;
            background: linear-gradient(180deg, #00ffff 20%, #001111 100%);
            border-radius: 18px 18px 10px 10px;
        }

        .equip-slot.boots::before {
            width: 40px;
            height: 24px;
            background: linear-gradient(180deg, #00ff88 20%, #001111 100%);
            border-radius: 12px;
        }

        .equip-slot.glove::before {
            width: 26px;
            height: 26px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            box-shadow: inset 0 0 8px #00ff88;
        }

        .equip-slot.chip::before {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00ff88, #002a1a);
            border-radius: 8px;
            box-shadow: inset 0 0 8px #00ff88;
        }

        #databank-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
        }

        .databank-entry {
            background: rgba(0, 20, 20, 0.9);
            border: 2px solid #00ffff;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
        }

        .databank-entry.unlocked {
            border-color: #00ff88;
        }

        .databank-entry.selected {
            box-shadow: 0 0 14px #00ff88;
        }

        #databank-preview {
            flex: 1;
            background: rgba(0, 10, 10, 0.95);
            border: 2px solid #00ffff;
            padding: 14px;
            min-height: 180px;
            border-radius: 8px;
        }

        #databank-notice {
            position: fixed;
            right: 20px;
            top: 20px;
            background: rgba(0, 20, 20, 0.95);
            border: 2px solid #00ff88;
            padding: 14px 18px;
            color: #00ff88;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            z-index: 510;
        }

        #databank-notice.show {
            transform: translateX(0);
        }

        /* Pause Menu */
        #pause-menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 10, 10, 0.98);
    border: 3px solid #00ffff;
    padding: 50px 45px;
    text-align: center;

    display: none;

    z-index: 600;
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
    pointer-events: auto;
    border-radius: 20px;
    width: 320px;
    min-height: 400px;

    flex-direction: column;
    justify-content: center;
    gap: 25px;
}

        #pause-menu.visible {
            display: flex;
        }

        /* Death Screen */
        #death-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 0, 0, 0.98);
            border: 3px solid #ff3333;
            padding: 40px 60px;
            text-align: center;
            display: none;
            z-index: 600;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.5);
            pointer-events: auto;
        }

        #death-screen.visible {
            display: block;
        }

        .status-label {
            color: #00ffff;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00ffff;
        }

        #death-screen .status-label {
            color: #ff3333;
            text-shadow: 0 0 20px #ff3333;
        }

        .menu-button {
            background: rgba(0, 20, 20, 0.95);
            border: 2px solid #00ffff;
            color: #00ff88;
            padding: 15px 40px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .menu-button:hover {
            background: rgba(0, 40, 40, 0.95);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            transform: scale(1.05);
        }

        #death-screen .menu-button {
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.3);
        }

        #death-screen .menu-button:hover {
            background: rgba(40, 0, 0, 0.95);
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.6);
        }

        .status-bars {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            z-index: 50;
        }

        .status-block {
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-block .status-label {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
            bottom: -20px;
            white-space: nowrap;
            margin: 0;
        }

        .status-bar {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: rgba(0, 20, 20, 0.95);
            border: 2px solid #00ffff;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }

        .status-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00ff88, #00ffaa);
            transition: height 0.2s;
            box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.6), 0 0 10px rgba(0, 255, 136, 0.4);
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-text">Initializing Simulation...</div>
    </div>

    <!-- HUD -->
    <div class="hud">
        <div class="chip-counter">
    CHIPS: <span id="chip-count">0</span>
</div>
<div id="fabricator-ui">
    <div id="fabricator-header">FABRICATOR</div>
    <div id="fabricator-grid"></div>
</div>

        <div class="fragment-counter">
            FRAGMENTS SCANNED: <span id="fragment-count">0</span>/5
        </div>
        <div id="inventory-ui" class="inventory-ui hidden">
            <button id="inventory-close" class="inventory-close">×</button>
            <div class="inventory-header">
                <div data-tab="inventory" class="inventory-tab active">Inventory</div>
                <div data-tab="drones" class="inventory-tab">Drones</div>
                <div data-tab="equipment" class="inventory-tab">Equipment</div>
                <div data-tab="databank" class="inventory-tab">Databank</div>
            </div>
            <div class="inventory-content">
                <div id="inventory-body" class="inventory-panel"></div>
                <div id="inventory-side" class="inventory-panel"></div>
            </div>
        </div>
        <div id="databank-notice">New databank entry unlocked</div>
        <div id="pause-menu">
            <div class="status-label">Paused</div>
            <button class="menu-button" id="resume-button">Resume</button>
            <button class="menu-button" id="options-button">Options</button>
            <button class="menu-button" id="save-quit-button">Save and Quit</button>
        </div>
        <div id="death-screen">
            <div class="status-label">You Died</div>
            <button class="menu-button" id="respawn-button">Respawn</button>
            <button class="menu-button" id="title-button">Title Screen</button>
        </div>
        <div class="status-bars">
            <div class="status-block">
                <div class="status-label">HEALTH</div>
                <div class="status-bar"><div class="status-fill" id="health-fill"></div></div>
            </div>
            <div class="status-block">
                <div class="status-label">THIRST</div>
                <div class="status-bar"><div class="status-fill" id="thirst-fill"></div></div>
            </div>
            <div class="status-block">
                <div class="status-label">HUNGER</div>
                <div class="status-bar"><div class="status-fill" id="hunger-fill"></div></div>
            </div>
        </div>
        <div id="hotbar">
    <div class="slot selected"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
</div>

        <div class="crosshair"></div>
        <div class="scanner-indicator" id="scanner-indicator"></div>
        <div class="notification" id="notification"></div>
        <div id="blueprint-hud"></div>
        <div class="portal-message" id="portal-message">
            Enter the Portal
        </div>
        
</div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game State
        const gameState = {
            chips: 0,
            fragmentsScanned: 0,
            totalFragments: 5,
            portalActive: false,
            canEnterPortal: false,
            isScanning: false,
            keys: {},
            mouseMovement: { x: 0, y: 0 },
            velocity: new THREE.Vector3(),
            isJumping: false,
            powerGeneratorActivated: false,
            scannerUnlocked: false,
            scannerCrafted: false,
            generatorBlueprintUnlocked: false,
            generatorCrafted: false,
            generatorPlaced: false,
            foodBlueprintUnlocked: false,
            waterBlueprintUnlocked: false,
            foodCrafted: false,
            waterCrafted: false,
            isDead: false,
            heldItem: null,
            hotbar: new Array(10).fill(null),
            inventory: new Array(50).fill(null),
            selectedSlot: 0,
            inventoryTab: 'inventory',
            itemTransfer: null,
            droneMode: false,
            selectedDatabankEntry: null,
            databankEntries: [
                { id: 'scanner', name: 'Scanner', unlocked: false },
                { id: 'powerGenerator', name: 'Power Generator', unlocked: false },
                { id: 'digitalCrab', name: 'Digital Crab', unlocked: false },
                { id: 'food', name: 'Food', unlocked: false },
                { id: 'water', name: 'Water', unlocked: false }
            ],
            isFabricatorOpen: false,
            uiMode: 'game', // 'game', 'fabricator', 'inventory'
            health: 100,
            hunger: 100,
            thirst: 100,
        };

        // Three.js Setup
        let scene, camera, renderer, controls;
        let player, playerBody;
        let platforms = [], chips = [], fragments = [], creatures = [];
        let powerGenerator, portal, portalParticles = [];
        let collisionMeshes = []; // Track all solid objects

function createInventorySlot(item, index, source) {
    const slot = document.createElement('div');
    slot.className = 'inventory-slot';
    if (!item) slot.classList.add('empty');
    if (gameState.itemTransfer && gameState.itemTransfer.source === source && gameState.itemTransfer.index === index) {
        slot.classList.add('selected');
    }
    slot.dataset.source = source;
    slot.dataset.index = index;
    slot.addEventListener('click', () => {
        inventorySlotClick(source, index);
    });

    if (item) {
        const icon = document.createElement('div');
        icon.className = `item-icon ${item}`;
        slot.appendChild(icon);
    }

    return slot;
}

function inventorySlotClick(source, index) {
    const sourceArr = source === 'hotbar' ? gameState.hotbar : gameState.inventory;
    const item = sourceArr[index];

    if (gameState.droneMode) {
        if (!item) return;
        if (item !== 'drone') {
            showNotification('Not a drone');
            return;
        }
        showNotification('Drone assigned');
        gameState.droneMode = false;
        renderInventoryUI();
        return;
    }

    if (!gameState.itemTransfer) {
        if (!item) return;
        gameState.itemTransfer = { source, index, item };
        renderInventoryUI();
        return;
    }

    const fromArr = gameState.itemTransfer.source === 'hotbar' ? gameState.hotbar : gameState.inventory;
    if (gameState.itemTransfer.source === source && gameState.itemTransfer.index === index) {
        gameState.itemTransfer = null;
        renderInventoryUI();
        return;
    }

    const targetArr = sourceArr;
    if (!targetArr[index]) {
        targetArr[index] = gameState.itemTransfer.item;
        fromArr[gameState.itemTransfer.index] = null;
    } else {
        const temp = targetArr[index];
        targetArr[index] = gameState.itemTransfer.item;
        fromArr[gameState.itemTransfer.index] = temp;
    }

    gameState.itemTransfer = null;
    updateHeldItemFromHotbar();
    renderInventoryUI();
}

            // Builds Platforms
        function createPlatform(x, y, z, width, depth) {
    const geometry = new THREE.BoxGeometry(width, 0.3, depth);
    const material = new THREE.MeshStandardMaterial({ 
        color: 0x1a1a1a,
        roughness: 0.9,
        metalness: 0.1
    });

    const platform = new THREE.Mesh(geometry, material);
    platform.position.set(x, y, z);
    scene.add(platform);

    const edgeGeometry = new THREE.EdgesGeometry(geometry);
    const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff });
    const edges = new THREE.LineSegments(edgeGeometry, edgeMaterial);
    edges.position.set(x, y + 0.16, z);
    scene.add(edges);

    const glowGeometry = new THREE.PlaneGeometry(width + 0.2, depth + 0.2);
    const glowMaterial = new THREE.MeshBasicMaterial({ 
        color: 0x00ffff,
        transparent: true,
        opacity: 0.1,
        side: THREE.DoubleSide
    });
    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
    glow.rotation.x = -Math.PI / 2;
    glow.position.set(x, y + 0.2, z);
    scene.add(glow);

    platforms.push({ mesh: platform });
    return { mesh: platform, edges, glow };
}

function createChips() {
    const chipPositions = [
        { x: 5, y: 1.5, z: 5 },
        { x: -5, y: 1.5, z: -5 },
        { x: 8, y: 1.5, z: -3 },
        { x: -7, y: 1.5, z: 4 },
        { x: 18, y: 1.5, z: 0 },
        { x: -18, y: 1.5, z: 0 },
        { x: 0, y: 1.5, z: 18 },
        { x: 0, y: 1.5, z: -18 }
    ];

    chipPositions.forEach(pos => {
        createChip(pos.x, pos.y, pos.z);
    });
}


        

        function createChip(x, y, z) {
            // Glass-like shard with matrix code inside
            const geometry = new THREE.OctahedronGeometry(0.3, 0);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x00ff88,
                transparent: true,
                opacity: 0.6,
                emissive: 0x00ff88,
                emissiveIntensity: 0.3
            });
            const chip = new THREE.Mesh(geometry, material);
            chip.position.set(x, y, z);
            
            // Inner glow
            const innerGeo = new THREE.OctahedronGeometry(0.15, 0);
            const innerMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ff88,
                transparent: true,
                opacity: 0.8
            });
            const innerChip = new THREE.Mesh(innerGeo, innerMat);
            chip.add(innerChip);

            chip.userData = { 
                type: 'chip',
                rotation: Math.random() * 0.02 + 0.01,
                floatOffset: Math.random() * Math.PI * 2,
                baseY: chip.position.y
            };
            
            scene.add(chip);
            chips.push(chip);
        }

        function createFragments() {
            const fragmentPositions = [
                { x: 3, y: 1, z: -8 },
                { x: -15, y: 1, z: 5 },
                { x: 20, y: 1, z: -5 },
                { x: -8, y: 3.5, z: -10 },
                { x: 15, y: 1, z: 15 },
            ];

            fragmentPositions.forEach((pos, index) => {
                createFragment(pos.x, pos.y, pos.z, index);
            });
        }

        function createFragment(x, y, z, id) {
            // Holographic broken geometry
            const geometry = new THREE.IcosahedronGeometry(0.5, 0);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff,
                transparent: true,
                opacity: 0.4,
                wireframe: true
            });
            const fragment = new THREE.Mesh(geometry, material);
            fragment.position.set(x, y, z);

            // Glitch particles
            const particleGeo = new THREE.BufferGeometry();
            const particlePositions = [];
            for (let i = 0; i < 20; i++) {
                particlePositions.push(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
            }
            particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ 
                color: 0x00ffff, 
                size: 0.05,
                transparent: true,
                opacity: 0.6
            });
            const particles = new THREE.Points(particleGeo, particleMat);
            fragment.add(particles);

            fragment.userData = { 
                type: 'fragment',
                id: id,
                scanned: false,
                rotation: Math.random() * 0.03
            };
            
            scene.add(fragment);

        function activatePortal() {
            if (gameState.portalActive) return;
            gameState.portalActive = true;

            const hexMesh = portal.userData.hexMesh;
            const hexOutline = portal.userData.hexOutline;

            // Animation: Hex deepens and opens
            let animProgress = 0;
            const animInterval = setInterval(() => {
                animProgress += 0.02;

                if (animProgress < 1) {
                    hexMesh.position.y = -animProgress * 2;
                    hexOutline.position.y = -animProgress * 2 + 0.05;
                    hexOutline.material.color.setHex(0x00ff88);
                } else {
                    clearInterval(animInterval);
                    
                    // Remove hex, create void hole
                    portal.remove(hexMesh);
                    portal.remove(hexOutline);

                    // Create black void
                    const voidGeometry = new THREE.CircleGeometry(2, 32);
                    const voidMaterial = new THREE.MeshBasicMaterial({ 
                        color: 0x000000,
                        side: THREE.DoubleSide
                    });
                    const voidMesh = new THREE.Mesh(voidGeometry, voidMaterial);
                    voidMesh.rotation.x = -Math.PI / 2;
                    portal.add(voidMesh);

                    // Matrix streams
                    createMatrixStreams();
                    
                    gameState.canEnterPortal = true;
                }
            }, 50);
        }

        function createMatrixStreams() {
            const streamCount = 4;
            const positions = [
                { x: 2, z: 0 },
                { x: -2, z: 0 },
                { x: 0, z: 2 },
                { x: 0, z: -2 }
            ];

            positions.forEach((pos, i) => {
                const streamGeometry = new THREE.CylinderGeometry(0.05, 0.05, 3, 8);
                const streamMaterial = new THREE.MeshBasicMaterial({ 
                    color: 0x00ff88,
                    transparent: true,
                    opacity: 0.7
                });
                const stream = new THREE.Mesh(streamGeometry, streamMaterial);
                stream.position.set(pos.x, 1.5, pos.z);
                stream.userData = {
                    startX: pos.x,
                    startZ: pos.z,
                    progress: 0
                };
                portal.add(stream);
                portalParticles.push(stream);
            });
        }

        function updateMatrixStreams() {
            portalParticles.forEach(stream => {
                stream.userData.progress += 0.02;
                const progress = Math.min(stream.userData.progress, 1);
                
                // Move toward center
                stream.position.x = stream.userData.startX * (1 - progress);
                stream.position.z = stream.userData.startZ * (1 - progress);
                stream.position.y = 1.5 - progress * 1;
                stream.scale.y = 1 - progress * 0.5;

                if (progress >= 1) {
                    stream.userData.progress = 0;
                }
            });
        }

    scanner.classList.add('active');

        scanner.classList.remove('active');
    }, 900);

    // ===== BLUEPRINT UNLOCK CHECK =====
    if (
        gameState.fragmentsScanned >= gameState.totalFragments &&
        !gameState.generatorBlueprintUnlocked
    ) {
        gameState.generatorBlueprintUnlocked = true;

        showBlueprintHUD(
            `${gameState.totalFragments}/${gameState.totalFragments} Data Fragments Scanned. Blueprint Unlocked: Power Generator`
        );

        showNotification('Power Generator Blueprint Unlocked');
        unlockDatabankEntry('powerGenerator');
    }
}


        function activatePowerGenerator() {

    if (!gameState.generatorCrafted) {
        showNotification('Power Generator not crafted');
        return;
    }

    if (gameState.fragmentsScanned < gameState.totalFragments) {
        showNotification('Insufficient data. Scan all fragments first.');
        return;
    }


            gameState.powerGeneratorActivated = true;
            powerGenerator.userData.activated = true;
            
            // Visual activation
            powerGenerator.userData.innerGlow.material.opacity = 0.6;
            powerGenerator.material.emissive.setHex(0x00ffff);
            powerGenerator.material.emissiveIntensity = 0.8;

            showNotification('Power Generator Activated');
            
            setTimeout(() => {
                
                showNotification('Portal is now active');
            }, 2000);
        }

function enterPortal() {
    if (gameState.enteringPortal) return;
    gameState.enteringPortal = true;

    showNotification('Entering the Portal...');
    gameState.canEnterPortal = false;

    let fallSpeed = 0;

    const fallInterval = setInterval(() => {
        fallSpeed += 0.03;
        player.position.y -= fallSpeed;
        camera.rotation.x += 0.01;

        if (player.position.y < -30) {
            clearInterval(fallInterval);
            window.location.href = 'level_two.html';
        }
    }, 16);
}


        function collectChip(chip) {
    gameState.chips++;

    document.getElementById('chip-count').textContent = gameState.chips;

    // First chip discovery
if (gameState.chips === 1 && !gameState.scannerUnlocked) {
    showNotification('New Blueprint Discovered: SCANNER');
}

// Unlock scanner after FIRST chip
if (!gameState.scannerUnlocked) {
    gameState.scannerUnlocked = true;
    showBlueprintHUD('Blueprint Unlocked: Scanner');
    unlockDatabankEntry('scanner');
}




    // Chip collection animation
    const targetPos = player.position.clone();
    const startPos = chip.position.clone();
    let progress = 0;

    const collectInterval = setInterval(() => {
        progress += 0.1;
        chip.position.lerpVectors(startPos, targetPos, progress);
        chip.scale.multiplyScalar(0.9);
        chip.material.opacity *= 0.9;

        if (progress >= 1) {
            clearInterval(collectInterval);
            scene.remove(chip);
            chips.splice(chips.indexOf(chip), 1);
        }
    }, 16);
}

        function updatePlayer(delta) {
            if (gameState.uiMode !== 'game') return;

            // Mouse look
            const rotationSpeed = 0.002;
            player.rotation.y -= gameState.mouseMovement.x * rotationSpeed;
            camera.rotation.x -= gameState.mouseMovement.y * rotationSpeed;
            camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            gameState.mouseMovement.x = 0;
            gameState.mouseMovement.y = 0;

            // Movement
            const moveVector = new THREE.Vector3();
            if (gameState.keys['w']) moveVector.z -= 1;
            if (gameState.keys['s']) moveVector.z += 1;
            if (gameState.keys['a']) moveVector.x -= 1;
            if (gameState.keys['d']) moveVector.x += 1;

            if (moveVector.length() > 0) {
                moveVector.normalize();
                moveVector.applyQuaternion(player.quaternion);
                const isSneaking = gameState.keys['shift'];

const speed = MOVE_SPEED * (isSneaking ? SNEAK_MULTIPLIER : 1);
const newX = player.position.x + moveVector.x * speed * delta;
const newZ = player.position.z + moveVector.z * speed * delta;

const canMoveX = !checkCollision(
    newX,
    player.position.y,
    player.position.z
);

const canMoveZ = !checkCollision(
    player.position.x,
    player.position.y,
    newZ
);

if (canMoveX) {
    player.position.x = newX;
}

if (canMoveZ) {
    player.position.z = newZ;
}

// Camera height adjust
camera.position.y = PLAYER_HEIGHT - (isSneaking ? SNEAK_CAMERA_OFFSET : 0);

            }

            // Gravity
            gameState.velocity.y += GRAVITY * delta;
            player.position.y += gameState.velocity.y * delta;

            // Ground collision (simple)
            const groundY = getGroundHeight(player.position.x, player.position.z);
            if (player.position.y <= groundY) {
                player.position.y = groundY;
                gameState.velocity.y = 0;
                gameState.isJumping = false;
            }


            // Portal proximity
            if (gameState.canEnterPortal) {
                const distance = player.position.distanceTo(portal.position);
                if (distance < 5) {
                    document.getElementById('portal-message').classList.add('show');
                } else {
                    document.getElementById('portal-message').classList.remove('show');
                }
            }
        }

       function getGroundHeight(x, z) {

    let maxY = 0;

    // Platforms
    platforms.forEach(platform => {

        const mesh = platform.mesh;

        const halfWidth =
            mesh.geometry.parameters.width / 2;

        const halfDepth =
            mesh.geometry.parameters.depth / 2;

        if (
            x >= mesh.position.x - halfWidth &&
            x <= mesh.position.x + halfWidth &&
            z >= mesh.position.z - halfDepth &&
            z <= mesh.position.z + halfDepth
        ) {

            maxY = Math.max(
                maxY,
                mesh.position.y + 0.15
            );
        }
    });

    // Collision objects
    collisionMeshes.forEach(mesh => {

        if (!mesh || !mesh.geometry) return;

        const pos = new THREE.Vector3();
        mesh.getWorldPosition(pos);

        const scale = new THREE.Vector3();
        mesh.getWorldScale(scale);

        const width =
            (mesh.geometry.parameters.width || 1) * scale.x;

        const depth =
            (mesh.geometry.parameters.depth || 1) * scale.z;

        const height =
            (mesh.geometry.parameters.height || 1) * scale.y;

        const halfW = width / 2;
        const halfD = depth / 2;

        const inside =
            x >= pos.x - halfW &&
            x <= pos.x + halfW &&
            z >= pos.z - halfD &&
            z <= pos.z + halfD;

        if (!inside) return;

        const top = pos.y + height / 2;

        // only allow standing if near top
        if (player.position.y >= top - 1.2) {
            maxY = Math.max(maxY, top);
        }
    });

    return maxY;
}
function checkCollision(x, y, z) {

    const PLAYER_RADIUS = 0.3;
    const PLAYER_HEIGHT_COLLISION = 1.7;
    const STEP_HEIGHT = 0.45;

    for (const mesh of collisionMeshes) {

        if (!mesh || !mesh.geometry) continue;

        const pos = new THREE.Vector3();
        mesh.getWorldPosition(pos);

        const scale = new THREE.Vector3();
        mesh.getWorldScale(scale);

        const width =
            (mesh.geometry.parameters.width || 1) * scale.x;

        const depth =
            (mesh.geometry.parameters.depth || 1) * scale.z;

        const height =
            (mesh.geometry.parameters.height || 1) * scale.y;

        // Ignore tiny objects
        if (height <= STEP_HEIGHT) continue;

        const halfW = width / 2;
        const halfD = depth / 2;
        const halfH = height / 2;

        const collideX =
            x + PLAYER_RADIUS > pos.x - halfW &&
            x - PLAYER_RADIUS < pos.x + halfW;

        const collideZ =
            z + PLAYER_RADIUS > pos.z - halfD &&
            z - PLAYER_RADIUS < pos.z + halfD;

        const collideY =
            y < pos.y + halfH &&
            y + PLAYER_HEIGHT_COLLISION > pos.y - halfH;

        // Ignore ceilings above player
        const roofAbove =
            pos.y - halfH > y + PLAYER_HEIGHT_COLLISION;

        if (roofAbove) continue;

        if (collideX && collideY && collideZ) {
            return true;
        }
    }

    return false;
}
        

        function updateChips(delta) {
            chips.forEach(chip => {
                chip.rotation.y += chip.userData.rotation;
                chip.position.y = chip.userData.baseY + Math.sin(Date.now() * 0.001 + chip.userData.floatOffset) * 0.1;
            });
        }

        function updateFragments(delta) {
            fragments.forEach(fragment => {
                fragment.rotation.y += fragment.userData.rotation;
                fragment.rotation.x += fragment.userData.rotation * 0.5;
            });
        }

        function updateCreatures(delta) {
            creatures.forEach(creature => {
                creature.userData.changeDirectionTimer -= delta;
                
                if (creature.userData.changeDirectionTimer <= 0) {
                    creature.userData.direction = new THREE.Vector3(
                        Math.random() - 0.5, 
                        0, 
                        Math.random() - 0.5
                    ).normalize();
                    creature.userData.changeDirectionTimer = Math.random() * 3 + 2;
                }

                const moveAmount = creature.userData.moveSpeed * delta;
                creature.position.x += creature.userData.direction.x * moveAmount;
                creature.position.z += creature.userData.direction.z * moveAmount;

                // Simple boundary
                if (Math.abs(creature.position.x) > 30 || Math.abs(creature.position.z) > 30) {
                    creature.userData.direction.multiplyScalar(-1);
                }

                // Rotate to face direction
                const angle = Math.atan2(creature.userData.direction.x, creature.userData.direction.z);
                creature.rotation.y = angle;
            });
        }

        function updatePowerGenerator(delta) {
            if (!powerGenerator || !powerGenerator.visible || !powerGenerator.userData.pickable || !powerGenerator.userData.dropped) return;

            powerGenerator.userData.velocityY += GRAVITY * delta;
            powerGenerator.position.y += powerGenerator.userData.velocityY * delta;

            const groundY = getGroundHeight(powerGenerator.position.x, powerGenerator.position.z);
            const minY = groundY + 0.75;

            if (powerGenerator.position.y <= minY) {
                powerGenerator.position.y = minY;
                powerGenerator.userData.velocityY = 0;
                powerGenerator.userData.dropped = false;
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        function showBlueprintHUD(text) {
    const hud = document.getElementById('blueprint-hud');
    hud.textContent = text;
    hud.classList.add('show');

    setTimeout(() => {
        hud.classList.remove('show');
    }, 2000);
}

        function animate() {
            
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            updatePlatformGrid();
            updatePlayer(delta);
            updateChips(delta);
            updateFragments(delta);
            updateCreatures(delta);
            updatePowerGenerator(delta);
            updateVitals(delta);
            updateStatusBars();

            checkPortalEntry();

            if (gameState.portalActive) {
                updateMatrixStreams();
                powerGenerator.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
            updateHeldItemVisual();

        }

        // Initialize
        init();
    </script>
